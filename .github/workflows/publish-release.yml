name: Publish Release

on:
  release:
    branches: [ "master" ]
    types: [ published ]

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: JDK 25 setup
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'adopt'

      - name: Print release version
        run: echo "Release version - $KORA_VERSION"
        env:
          KORA_VERSION: ${{ github.event.release.tag_name }}

      - name: Gradle setup
        uses: gradle/actions/setup-gradle@v4

      - name: Gradle artifact
        run: ./gradlew assemble jar

      - name: Gradle publish
        run: ./gradlew uploadPublishArchive -Psigning.secretKeyRingFile=/tmp/secring.gpg --no-daemon
        env:
          KORA_IO_SIGNING_KEY: ${{ secrets.KORA_IO_SIGNING_KEY }}
          KORA_IO_SIGNING_PASSWORD: ${{ secrets.KORA_IO_SIGNING_PASSWORD }}
          SONATYPE_KORA_IO_USERNAME: ${{ secrets.SONATYPE_KORA_IO_USERNAME }}
          SONATYPE_KORA_IO_PASSWORD: ${{ secrets.SONATYPE_KORA_IO_PASSWORD }}
          KORA_VERSION: ${{ github.event.release.tag_name }}

  notify:
    runs-on: ubuntu-latest
    needs: publish
    timeout-minutes: 95
    steps:
      - id: kora_changelog
        run: |
          KORA_CHANGELOG_TAG=${{ github.event.release.tag_name }}
          KORA_CHANGELOG_TAG=${KORA_CHANGELOG_TAG//.}
          echo "KORA_CHANGELOG_TAG=${KORA_CHANGELOG_TAG}" >> $GITHUB_OUTPUT

      - name: Extract description
        run: |
          echo "KORA_CHANGELOG_DESCRIPTION<<EOF" >> $GITHUB_ENV
          echo "Часть изменений в $(curl -s https://kora-projects.github.io/kora-docs/ru/changelog/changelog/ | grep -o '<meta property="og:description" content=".*' | grep -o '"[^"]*"' | tail -n +2 | tr -d '"' | sed 's/[:,]/\n-/g') " >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
