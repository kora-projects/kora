name: Run PR tests

on:
  pull_request:
    branches:
      - "master"
      - "2.0"


permissions:
  contents: read
  checks: write
  pull-requests: write


jobs:
  run-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    strategy:
      matrix:
        task: [ 'postgres', 'cassandra', 'redis', 'kafka', 'openapi', 'codegen-kotlin', 'codegen-java', 'other' ]
    steps:
      - uses: actions/checkout@v4
      - name: JDK 25 setup
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'adopt'

      - name: Gradle setup
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/master' }}
          gradle-home-cache-cleanup: ${{ github.ref == 'refs/heads/master' }}

      - name: Gradle ${{ matrix.task }} classes
        run: ./gradlew classes-${{ matrix.task }} --scan --no-daemon --parallel
        shell: bash

      - name: Gradle ${{ matrix.task }} javadoc
        run: ./gradlew javadoc-${{ matrix.task }} --scan --no-daemon --parallel
        shell: bash

      - name: Gradle ${{ matrix.task }} test classes
        run: ./gradlew testClasses-${{ matrix.task }} --no-daemon --parallel
        shell: bash

      - name: Gradle ${{ matrix.task }} test
        run: ./gradlew test-${{ matrix.task }} --scan --no-daemon --parallel
        shell: bash

      - name: Publish ${{ matrix.task }} test report
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: |
            **/test-results/**/*.xml

  dependency-report-artifacts:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: run-tests
    steps:
      - uses: actions/checkout@v4

      - name: JDK 25 setup
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'adopt'

      - name: Gradle setup
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: true

      - name: Generate vulnerability report
        run: ./gradlew -I gradle/update-libs-versions.gradle updateLibsVersions -PreportVulnerabilities=true -PvulnerabilityReportFile=build/reports/dependency-vulnerabilities.md --no-daemon --console plain
        shell: bash

      - name: Generate dependency update report
        run: ./gradlew -I gradle/update-libs-versions.gradle updateLibsVersions -PreportUpdates=true -PupdateLevel=patch -PupdateReportFile=build/reports/dependency-updates.md --no-daemon --console plain
        shell: bash

      - name: Upload dependency reports
        uses: actions/upload-artifact@v4
        with:
          name: dependency-reports
          path: |
            build/reports/dependency-vulnerabilities.md
            build/reports/dependency-updates.md
