name: Dependency reports

on:
  workflow_run:
    workflows:
      - Run PR tests
    types:
      - completed

permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: write

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: |
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.pull_requests[0] != null
    steps:
      - name: Resolve pull request
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.workflow_run.pull_requests[0];
            core.setOutput('number', String(pr.number));

      - name: Download dependency reports
        uses: actions/download-artifact@v4
        with:
          name: dependency-reports
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: build/reports

      - name: Check vulnerability report result
        id: vuln
        run: |
          report="build/reports/dependency-vulnerabilities.md"
          if grep -q '^\*\*Found `' "$report"; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi
        shell: bash

      - name: Comment vulnerability report
        if: github.event_name == 'workflow_run' && steps.vuln.outputs.found == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- kora-dependency-vulnerability-report -->';
            const body = fs.readFileSync('build/reports/dependency-vulnerabilities.md', 'utf8');
            const { owner, repo } = context.repo;
            const issue_number = Number('${{ steps.pr.outputs.number }}');

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) => comment.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Check dependency update report result
        id: updates
        run: |
          report="build/reports/dependency-updates.md"
          if grep -q '^\*\*Found `' "$report"; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi
        shell: bash

      - name: Comment dependency update report
        if: github.event_name == 'workflow_run' && steps.updates.outputs.found == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- kora-dependency-update-report -->';
            const body = fs.readFileSync('build/reports/dependency-updates.md', 'utf8');
            const { owner, repo } = context.repo;
            const issue_number = Number('${{ steps.pr.outputs.number }}');

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) => comment.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
