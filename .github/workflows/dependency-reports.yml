name: Dependency reports

on:
  workflow_run:
    workflows:
      - Run PR tests
    types:
      - completed

permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: write

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: |
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Download dependency reports
        uses: actions/download-artifact@v4
        with:
          name: dependency-reports
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: ${{ runner.temp }}/dependency-reports

      - name: Resolve pull request
        id: pr
        run: |
          pr_number="$(tr -d '\r\n' < "${{ runner.temp }}/dependency-reports/pr-number.txt")"
          if ! [[ "$pr_number" =~ ^[0-9]+$ ]]; then
            echo "Invalid PR number in dependency reports artifact: $pr_number" >&2
            exit 1
          fi
          echo "number=$pr_number" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Check vulnerability report result
        id: vuln
        run: |
          report="${{ runner.temp }}/dependency-reports/dependency-vulnerabilities.md"
          if grep -q '^\*\*Found `' "$report"; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi
        shell: bash

      - name: Comment vulnerability report
        if: github.event_name == 'workflow_run' && steps.vuln.outputs.found == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- kora-dependency-vulnerability-report -->';
            const body = fs.readFileSync('${{ runner.temp }}/dependency-reports/dependency-vulnerabilities.md', 'utf8');
            const { owner, repo } = context.repo;
            const issue_number = Number('${{ steps.pr.outputs.number }}');

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) => comment.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Check dependency update report result
        id: updates
        run: |
          report="${{ runner.temp }}/dependency-reports/dependency-updates.md"
          if grep -q '^\*\*Found `' "$report"; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi
        shell: bash

      - name: Comment dependency update report
        if: github.event_name == 'workflow_run' && steps.updates.outputs.found == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- kora-dependency-update-report -->';
            const body = fs.readFileSync('${{ runner.temp }}/dependency-reports/dependency-updates.md', 'utf8');
            const { owner, repo } = context.repo;
            const issue_number = Number('${{ steps.pr.outputs.number }}');

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) => comment.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
