static ClassLoader getClassLoader(Configuration config) {
    ArrayList urls = new ArrayList()
    config.files.each { File file ->
        urls += file.toURI().toURL()
    }
    return new URLClassLoader(urls.toArray(new URL[0]) as URL[])
}

