openapi: 3.0.3

info:
  title: Client successful response mode
  version: 1.0.0

paths:
  /pets:
    post:
      operationId: createPet
      tags:
        - pets
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Pet'
      responses:
        '200':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /pets/shared:
    get:
      operationId: findPet
      tags:
        - pets
      responses:
        '200':
          description: Full
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
        '206':
          description: Partial
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /pets/ambiguous:
    get:
      operationId: ambiguousPet
      tags:
        - pets
      responses:
        '200':
          description: Full
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
        '204':
          description: Empty
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  schemas:
    Pet:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
    Error:
      type: object
      required:
        - message
      properties:
        message:
          type: string
