openapi: 3.0.3

info:
  title: PetStore with bare object
  version: 1.0.0

paths:
  /store/inventory:
    get:
      summary: Returns pet inventories by status
      operationId: getInventory
      responses:
        '200':
          description: A page of pet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
    post:
      summary: Stores any inventory payload
      operationId: storeInventory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Stored payload
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        '404':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        '500':
          description: Unknown server error
          content:
            application/json:
              schema:
                type: object
  /store/raw-object:
    post:
      summary: Exchanges any raw object payload
      operationId: rawObject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Raw object response
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Raw object validation error
          content:
            application/json:
              schema:
                type: object
        '500':
          description: Raw object server error
          content:
            application/json:
              schema:
                type: object

components:
  schemas:
    ErrorMessage:
      type: object
      required:
        - message
      properties:
        message:
          type: string
    Pet:
      type: object
      required:
        - id
        - metadata
      properties:
        id:
          type: integer
          format: int64
        metadata:
          type: object
        optionalMetadata:
          type: object
