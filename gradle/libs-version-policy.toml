# Per-version update limits for gradle/update-libs-versions.gradle.
#
# Keys are names from the [versions] section in libs.versions.toml.
# Inline versions can be limited with "inline:<lineNumber>" where lineNumber is 1-based
# in libs.versions.toml, but prefer moving shared versions into [versions] first.
#
# Levels:
# - any: allow any newer stable version
# - major: allow major version changes
# - minor: keep the current major version
# - patch: keep the current major and minor version

[version-levels]
# Keep legacy com.fasterxml.jackson artifacts on the 2.x line; Jackson 3 is tracked separately as tools.jackson.
jackson2-coreline = "minor"
jackson2-annotations = "minor"

# Keep Logback on the current 1.x line unless SLF4J/logging modules are tested against a new major.
logback = "minor"

# Keep legacy Commons artifacts on their current major lines; some have major-line replacements under different coordinates.
commons-cli = "minor"
commons-codec = "minor"
commons-collections = "patch"
commons-fileupload = "minor"
commons-io = "minor"
commons-lang3 = "minor"
commons-logging = "minor"
commons-text = "minor"

# Keep Prometheus metrics on the current 1.x line.
prometheus-metrics = "minor"

# Keep Swagger 2.x / parser 2.x lines unless OpenAPI generator stack is tested against a new major.
swagger-coreline = "minor"
swagger-parser = "minor"

# Keep RESTEasy on 6.x unless the Jakarta stack is intentionally migrated.
resteasy = "minor"
